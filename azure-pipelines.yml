trigger:
  branches:
    include:
      - main
      - iteration_no.*

pr:
  branches:
    include:
      - main

pool:
  vmImage: windows-latest

variables:
  mainProject: 'main_interface/main_interface/main_interface.csproj'
  testProject: 'main_interface/main_interface.Tests/main_interface.Tests.csproj'
  buildConfiguration: 'Release'
  buildPlatform: 'x64'

steps:

  # install netsdk
  - task: UseDotNet@2
    displayName: 'Use .NET 8 SDK'
    inputs:
      packageType: sdk
      version: '8.x'

  # restore packages
  - task: DotNetCoreCLI@2
    displayName: 'Restore packages'
    inputs:
      command: restore
      projects: |
        $(mainProject)
        $(testProject)
      arguments: '-p:Platform=$(buildPlatform)'

  # Build (skip Package.wapproj by targeting csproj directly)
  - task: DotNetCoreCLI@2
    displayName: 'Build solution'
    inputs:
      command: build
      projects: |
        $(mainProject)
        $(testProject)
      arguments: >
        --configuration $(buildConfiguration)
        --no-restore
        -p:Platform=$(buildPlatform)
        -p:EnableNETAnalyzers=true
        -p:AnalysisLevel=latest

  # Install Windows App SDK runtime (required for WinUI3 assembly loading in tests)
  - task: PowerShell@2
    displayName: 'Install Windows App SDK Runtime'
    inputs:
      targetType: inline
      script: |
        $ProgressPreference = 'SilentlyContinue'
        $installer = "$env:TEMP\WinAppRuntimeInstall.exe"
        Invoke-WebRequest `
          -Uri 'https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe' `
          -OutFile $installer
        $result = Start-Process $installer -ArgumentList '--quiet' -Wait -PassThru
        Write-Host "Installer exit code: $($result.ExitCode)"
        # Exit code 0x00000000 = success, 0x00000001 = already installed — both are fine
        if ($result.ExitCode -ne 0 -and $result.ExitCode -ne 1) {
          exit $result.ExitCode
        }

  #  Run tests with code coverage
  - task: DotNetCoreCLI@2
    displayName: 'Run unit tests'
    inputs:
      command: test
      projects: '$(testProject)'
      arguments: >
        --configuration $(buildConfiguration)
        --no-build
        -p:Platform=$(buildPlatform)
        --collect:"XPlat Code Coverage"
        --results-directory $(Agent.TempDirectory)/TestResults
        --logger trx
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

  #  publish test results
  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: always()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
      mergeTestResults: true
      testRunTitle: 'Unit Tests - $(buildConfiguration)'

  # publish code coverage 
  - task: PublishCodeCoverageResults@2
    displayName: 'Publish code coverage'
    condition: always()
    inputs:
      summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
